general {
    lock_cmd = rob-lock
    before_sleep_cmd = ROB_LOCK_ONLY=true rob-lock
    after_sleep_cmd = sleep 1 && rob-wake
    inhibit_sleep = 3                                      # wait until screen is locked
}

# Start screensaver after 2.5 minutes
listener {
    timeout = 150
    on-timeout = pidof hyprlock || rob-screensaver-launch
}

# Lock system after 5 minutes (screensaver resets idle timer, so have to just do half + 2s margin)
listener {
    timeout = 152
    on-timeout = rob-lock
    on-resume = rob-wake
}
