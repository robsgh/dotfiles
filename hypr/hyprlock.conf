source = ~/.config/hypr/theme/hyprlock.conf

general {
    ignore_empty_input = true
}

background {
    monitor =
    color = $color
    path = ~/dotfiles/wallpapers/hyprlock.jpg
    blur_passes = 2
}

animations {
    enabled = false
}

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = $font_color
    font_size = 120
    font_family = CaskaydiaMono Nerd Font

    position = 0, 260
    halign = center
    valign = center

    shadow_passes = 0
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %-d"
    color = $muted_font_color
    font_size = 28
    font_family = CaskaydiaMono Nerd Font

    position = 0, 165
    halign = center
    valign = center

    shadow_passes = 0
}

input-field {
    monitor =
    size = 650, 100
    position = 0, 0
    halign = center
    valign = center

    inner_color = $inner_color
    outer_color = $outer_color
    outline_thickness = 4

    font_family = CaskaydiaMono Nerd Font
    font_color = $font_color

    placeholder_text = Enter Password
    check_color = $check_color
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    rounding = 0
    shadow_passes = 0
    fade_on_empty = false
}

auth {
    fingerprint:enabled = false
}
