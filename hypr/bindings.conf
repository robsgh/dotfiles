# Application bindings
$terminal = uwsm-app -- ghostty
$browser = rob-launch-browser

$mainMod = SUPER

bindd = $mainMod, RETURN, Terminal, exec, $terminal --working-directory="$(rob-terminal-cwd)"
bindd = $mainMod, E, File manager, exec, uwsm-app -- nautilus --new-window
bindd = $mainMod, O, Browser, exec, $browser
bindd = $mainMod SHIFT, O, Browser (private), exec, $browser --private
bindd = $mainMod SHIFT, T, Activity, exec, rob-launch-tui btop

bindd = $mainMod, Q, Close window, killactive
bindd = $mainMod ALT, K, Show key bindings, exec, rob-keybindings

# Move focus with $mainMod + vim keys
bindd = $mainMod, H, Move window focus left, movefocus, l
bindd = $mainMod, L, Move window focus right, movefocus, r
bindd = $mainMod, K, Move window focus up, movefocus, u
bindd = $mainMod, J, Move window focus down, movefocus, d

binde = $mainMod SHIFT, H, movewindow, l
binde = $mainMod SHIFT, L, movewindow, r
binde = $mainMod SHIFT, K, movewindow, u
binde = $mainMod SHIFT, J, movewindow, d

bindd = $mainMod, F, Toggle Window Floating, togglefloating
bindd = $mainMod SHIFT, F, Full screen, fullscreen, 0
bindd = SUPER, SPACE, Launch apps, exec, rob-launcher

# Notifications
bindd = SUPER, COMMA, Dismiss last notification, exec, makoctl dismiss
bindd = SUPER SHIFT, COMMA, Dismiss all notifications, exec, makoctl dismiss --all
bindd = SUPER CTRL, COMMA, Toggle silencing notifications, exec, rob-toggle-notifications
bindd = SUPER ALT, COMMA, Invoke last notification, exec, makoctl invoke
bindd = SUPER SHIFT ALT, COMMA, Restore last notification, exec, makoctl restore

# Toggles
bindd = SUPER CTRL, I, Toggle locking on idle, exec, rob-toggle-idle
bindd = SUPER CTRL, N, Toggle nightlight, exec, rob-toggle-nightlight
bindd = SUPER CTRL, Delete, Toggle laptop display, exec, rob-monitor-internal toggle
bindd = SUPER CTRL ALT, Delete, Toggle laptop display mirroring, exec, rob-monitor-internal-mirror toggle
bindl = , switch:on:Lid Switch, exec, rob-external-monitors && rob-monitor-internal off
bindl = , switch:off:Lid Switch, exec, rob-monitor-internal on

# Captures
bindd = , PRINT, Screenshot, exec, rob-screenshot
bindd = ALT, PRINT, Screenrecording, exec, rob-screenrecord-menu
bindd = SUPER, PRINT, Color picker, exec, pkill hyprpicker || hyprpicker -a
bindd = SUPER CTRL, PRINT, Extract text (OCR) from screenshot, exec, rob-ocr

# Control panels
bindd = SUPER CTRL, A, Audio controls, exec, rob-audio
bindd = SUPER CTRL, B, Bluetooth controls, exec, rob-bluetooth
bindd = SUPER CTRL, W, Wifi controls, exec, rob-wifi
bindd = SUPER CTRL, T, Activity, exec, rob-launch-tui btop

# Lock system
bindd = SUPER CTRL, L, Lock system, exec, rob-lock

# Copy / Paste
bindd = SUPER, C, Universal copy, exec, rob-clipboard-shortcut copy
bindd = SUPER, V, Universal paste, exec, rob-clipboard-shortcut paste
bindd = SUPER, X, Universal cut, exec, rob-clipboard-shortcut cut
bindd = SUPER CTRL, V, Clipboard manager, exec, rob-launcher -m clipboard

# Laptop multimedia keys for volume and LCD brightness (with OSD)
bindeld = ,XF86AudioRaiseVolume, Volume up, exec, rob-osd --output-volume raise
bindeld = ,XF86AudioLowerVolume, Volume down, exec, rob-osd --output-volume lower
bindeld = ,XF86AudioMute, Mute, exec, rob-osd --output-volume mute-toggle
bindeld = ,XF86AudioMicMute, Mute microphone, exec, rob-mic-mute
bindeld = ,XF86MonBrightnessUp, Brightness up, exec, rob-brightness +5%
bindeld = ,XF86MonBrightnessDown, Brightness down, exec, rob-brightness 5%-
bindeld = SHIFT, XF86MonBrightnessUp, Brightness maximum, exec, rob-brightness 100%
bindeld = SHIFT, XF86MonBrightnessDown, Brightness minimum, exec, rob-brightness 1%
bindeld = ,XF86KbdBrightnessUp, Keyboard brightness up, exec, rob-keyboard-brightness up
bindeld = ,XF86KbdBrightnessDown, Keyboard brightness down, exec, rob-keyboard-brightness down
bindld = ,XF86KbdLightOnOff, Keyboard backlight cycle, exec, rob-keyboard-brightness cycle
bindld = ,XF86TouchpadToggle, Toggle touchpad, exec, rob-touchpad
bindld = ,XF86TouchpadOn, Enable touchpad, exec, rob-touchpad on
bindld = ,XF86TouchpadOff, Disable touchpad, exec, rob-touchpad off

# Precise 1% multimedia adjustments with Alt modifier
bindeld = ALT, XF86AudioRaiseVolume, Volume up precise, exec, rob-osd --output-volume +1
bindeld = ALT, XF86AudioLowerVolume, Volume down precise, exec, rob-osd --output-volume -1
bindeld = ALT, XF86MonBrightnessUp, Brightness up precise, exec, rob-brightness +1%
bindeld = ALT, XF86MonBrightnessDown, Brightness down precise, exec, rob-brightness 1%-

# Requires playerctl
bindld = , XF86AudioNext, Next track, exec, rob-osd --playerctl next
bindld = , XF86AudioPause, Pause, exec, rob-osd --playerctl play-pause
bindld = , XF86AudioPlay, Play, exec, rob-osd --playerctl play-pause
bindld = , XF86AudioPrev, Previous track, exec, rob-osd --playerctl previous

# Switch audio output with Super + Mute
bindld = SUPER, XF86AudioMute, Switch audio output, exec, rob-audio-output-switch
